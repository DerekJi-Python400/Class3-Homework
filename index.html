<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Profile Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center gap-8 py-8">

  <!-- Part 4: Original Student Card -->
  <div class="bg-white rounded-lg shadow-md p-6 max-w-sm w-full flex flex-col items-center text-center">
    <img
      class="w-20 h-20 rounded-full object-cover mb-4"
      src="https://placehold.co/80x80"
      alt="Student profile photo"
    />
    <h2 class="text-2xl font-bold text-gray-900">Alex Johnson</h2>
    <p class="text-sm text-gray-500 mt-1">Grade 10</p>
    <p class="text-gray-600 mt-3">Favorite subject: Computer Science</p>
    <button class="mt-4 bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-700">
      View Profile
    </button>
  </div>

  <!-- Part 5: Extended Card (different styling) -->
  <div class="bg-blue-50 border-t-4 border-blue-400 rounded-lg shadow-md p-6 max-w-sm w-full flex flex-col items-center text-center">
    <img
      class="w-20 h-20 rounded-full object-cover mb-4"
      src="https://placehold.co/80x80"
      alt="Student profile photo"
    />
    <h2 class="text-2xl font-bold text-blue-700">Alex Johnson</h2>
    <p class="text-sm text-gray-500 mt-1">Grade 10</p>
    <p class="text-gray-600 mt-3">Favorite subject: Computer Science</p>
    <button class="mt-4 bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-700">
      View Profile
    </button>
  </div>

</body>
</html>
